<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sorry cutu 😘</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:white;
    font-family:Arial, sans-serif;
}

/* flower style */
.flower{
    position:absolute;
    user-select:none;
    pointer-events:none;
    animation: fade 2s linear forwards;
}

/* fade animation */
@keyframes fade{
    0%{opacity:0; transform:scale(0.5);}
    20%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0; transform:scale(1.4);}
}

/* moving sorry text */
#sorry{
    position:absolute;
    font-size:55px;
    font-weight:bold;
    color:#ff2e63;
    text-shadow:0 0 10px pink, 0 0 20px #ff9aa2;
}
</style>

</head>

<body>

<div id="sorry">sorry cutu 😘</div>

<script>

const flowers = ["🌻","🌹","🌷","🌼","🌺","💐","🌸","🏵️"];

function createFlower(){

    let flower = document.createElement("div");
    flower.className="flower";

    flower.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];

    flower.style.left = Math.random()*window.innerWidth+"px";
    flower.style.top = Math.random()*window.innerHeight+"px";

    flower.style.fontSize = (20 + Math.random()*60)+"px";

    document.body.appendChild(flower);

    // remove after animation ends
    setTimeout(()=>{
        flower.remove();
    },2000);
}

// continuously create flowers
setInterval(()=>{
    for(let i=0;i<8;i++){
        createFlower();
    }
},120);


// moving sorry text
let x=100;
let y=100;
let dx=2.5;
let dy=2;

const sorry=document.getElementById("sorry");

function moveSorry(){

    x+=dx;
    y+=dy;

    if(x+260>window.innerWidth || x<0){
        dx=-dx;
    }

    if(y+80>window.innerHeight || y<0){
        dy=-dy;
    }

    sorry.style.left=x+"px";
    sorry.style.top=y+"px";

    requestAnimationFrame(moveSorry);
}

moveSorry();

</script>

</body>
</html>
