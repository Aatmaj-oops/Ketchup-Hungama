<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flower Proposal</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
background:linear-gradient(#ffe6f0,#fff);
}

/* floating emoji flowers */
.flower{
position:absolute;
font-size:65px;
opacity:0;
animation:fadeOut 3s linear forwards;
pointer-events:none;
}

@keyframes fadeOut{
0%{
opacity:0;
transform:scale(0.4);
}

40%{
opacity:1;
}

100%{
opacity:0;
transform:scale(1.5);
}
}

/* center card */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.2);
z-index:5;
}

/* buttons */
button{
padding:12px 24px;
margin:12px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

#yesBtn{
background:#ff4d88;
color:white;
}

#noBtn{
background:#e0e0e0;
}

/* bouquet image */
#bouquet{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%) scale(0.05);

opacity:0;

width:450px;

z-index:10;

}

/* zoom animation */
.showBouquet{

animation:zoomForward 3s forwards;

}

@keyframes zoomForward{

0%{
transform:translate(-50%,-50%) scale(0.05);
opacity:0;
}

60%{
opacity:1;
}

100%{
transform:translate(-50%,-50%) scale(2);
opacity:1;
}

}

</style>

</head>


<body>



<div class="container" id="questionBox">

<h2>Will you accept my flower?🥺</h2>

<button id="yesBtn">Yes 💖</button>

<button id="noBtn">No 🙈</button>

</div>



<!-- single bouquet -->
<!-- final big bouquet -->
<img
id="bouquet"
src="https://perfectgiftadda.com/wp-content/uploads/2024/02/IMG_3099-scaled.jpeg">


<script>



/* emoji flowers */

const flowerList = [

"🌸","🌺","🌷","🌻","🌹","💮","🌼"

];



let flowerInterval;



function createFlower(){

let flower = document.createElement("div");

flower.className="flower";



flower.innerHTML =
flowerList[Math.floor(Math.random()*flowerList.length)];



flower.style.left =
Math.random()*100 + "vw";



flower.style.top =
Math.random()*100 + "vh";



document.body.appendChild(flower);



setTimeout(()=>{
flower.remove();
},3000);

}



/* start flowers */

flowerInterval =
setInterval(createFlower,100);





/* button grow logic */

let noCount=0;

let yesFontSize=18;



document.getElementById("noBtn").onclick=function(){



if(noCount<15){

noCount++;



yesFontSize += 16;



document.getElementById("yesBtn").style.fontSize =

yesFontSize + "px";



}

};





/* yes click */

document.getElementById("yesBtn").onclick=function(){



document.getElementById("questionBox").innerHTML=

"<h1>Yayy you accepted my flowers🥳</h1>";



/* stop flowers */

clearInterval(flowerInterval);



setTimeout(()=>{



document.getElementById("questionBox").style.display="none";



document.getElementById("bouquet")

.classList.add("showBouquet");



},1500);



};



</script>



</body>
</html>
